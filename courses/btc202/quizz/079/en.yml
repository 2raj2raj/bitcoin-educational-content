question: What is the maximum size of a blkNNNNN.dat file before a new file is created?
answer: 128 MB
wrong_answers:
  - 256 MB
  - 256 GB
  - 128 GB
explanation: |
  The blkNNNNN.dat files store the blocks sequentially and reach a size of around 128 MB before Bitcoin Core opens the next one.
reviewed: true
